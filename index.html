<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Roteiro de Atendimento — Clínica de Olhos Rondônia</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f8faf8; -webkit-font-smoothing: antialiased; }
    input:focus { border-color: #16a34a !important; outline: none; }
    button { cursor: pointer; font-family: inherit; }
    button:active { transform: scale(0.97); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .step-content { animation: fadeIn 0.25s ease-out; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(22,163,74,0.3); } 50% { box-shadow: 0 0 0 8px rgba(22,163,74,0); } }
    .pulse-ring { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

    const STEPS = {
      PATIENT_NAME: "patient_name",
      GREETING: "greeting",
      PERIOD: "period",
      INSURANCE: "insurance",
      INSURANCE_CHECK: "insurance_check",
      DATA: "data",
      LENSES: "lenses",
      LENSES_WARNING: "lenses_warning",
      CONFIRM: "confirm",
      CLOSING: "closing",
      OTHER: "other",
      NO_RESPONSE_1: "no_response_1",
      NO_RESPONSE_2: "no_response_2",
    };

    const CopyIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    );
    const CheckIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    );
    const ArrowIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    );
    const ResetIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    );

    function MessageBubble({ text, onCopy, copied }) {
      return (
        <div style={{ background:"#fff", border:"1px solid #d1d5db", borderLeft:"4px solid #16a34a", borderRadius:"0 12px 12px 0", padding:"16px 18px", margin:"12px 0", fontSize:"15px", lineHeight:"1.6", color:"#1a1a1a", whiteSpace:"pre-line", position:"relative" }}>
          <div style={{ fontSize:"10px", fontWeight:700, textTransform:"uppercase", letterSpacing:"1.2px", color:"#16a34a", marginBottom:"8px" }}>Mensagem para enviar</div>
          {text}
          <button onClick={() => onCopy(text)} style={{ display:"flex", alignItems:"center", gap:"6px", marginTop:"14px", padding:"10px 20px", background: copied ? "#16a34a" : "#f0fdf4", color: copied ? "#fff" : "#16a34a", border: copied ? "none" : "2px solid #16a34a", borderRadius:"8px", fontWeight:700, fontSize:"14px", transition:"all 0.2s", width:"100%", justifyContent:"center" }}>
            {copied ? <CheckIcon /> : <CopyIcon />}
            {copied ? "Copiado!" : "Copiar mensagem"}
          </button>
        </div>
      );
    }

    function ChoiceButton({ label, onClick, emoji, sublabel }) {
      const [hover, setHover] = useState(false);
      return (
        <button onClick={onClick} onMouseOver={() => setHover(true)} onMouseOut={() => setHover(false)}
          style={{ display:"flex", alignItems:"center", gap:"10px", width:"100%", padding:"14px 18px", background: hover ? "#f0fdf4" : "#fff", border: `2px solid ${hover ? "#16a34a" : "#e5e7eb"}`, borderRadius:"10px", fontSize:"15px", fontWeight:600, color:"#374151", textAlign:"left", transition:"all 0.15s", marginBottom:"8px" }}>
          {emoji && <span style={{ fontSize:"20px" }}>{emoji}</span>}
          <div>
            <div>{label}</div>
            {sublabel && <div style={{ fontSize:"12px", fontWeight:400, color:"#6b7280", marginTop:"2px" }}>{sublabel}</div>}
          </div>
          <span style={{ marginLeft:"auto", color:"#9ca3af" }}><ArrowIcon /></span>
        </button>
      );
    }

    function Alert({ children, type = "info" }) {
      const s = { info: { bg:"#eff6ff", border:"#3b82f6", color:"#1e40af", icon:"💡" }, warning: { bg:"#fef3c7", border:"#f59e0b", color:"#92400e", icon:"⚠️" }, success: { bg:"#f0fdf4", border:"#16a34a", color:"#166534", icon:"✅" } }[type];
      return (
        <div style={{ background:s.bg, borderLeft:`4px solid ${s.border}`, borderRadius:"0 8px 8px 0", padding:"12px 16px", margin:"12px 0", fontSize:"13px", color:s.color, lineHeight:"1.5" }}>
          <span style={{ marginRight:"6px" }}>{s.icon}</span>{children}
        </div>
      );
    }

    function StepIndicator({ current, total }) {
      return (
        <div style={{ display:"flex", gap:"4px", margin:"0 0 20px", alignItems:"center" }}>
          {Array.from({ length: total }, (_, i) => (
            <div key={i} style={{ height:"4px", flex:1, borderRadius:"2px", background: i < current ? "#16a34a" : i === current ? "#86efac" : "#e5e7eb", transition:"background 0.3s" }} />
          ))}
          <span style={{ fontSize:"11px", color:"#9ca3af", marginLeft:"8px", fontWeight:600, whiteSpace:"nowrap" }}>{current + 1}/{total}</span>
        </div>
      );
    }

    function App() {
      const [step, setStep] = useState(STEPS.PATIENT_NAME);
      const [copiedText, setCopiedText] = useState(null);
      const [data, setData] = useState({ patientFirstName:"", period:"", insurance:"", insuranceAccepted:true, name:"", age:"", lenses:"", lensType:"" });
      const [history, setHistory] = useState([]);
      const nameInputRef = useRef(null);

      useEffect(() => { if (step === STEPS.PATIENT_NAME && nameInputRef.current) nameInputRef.current.focus(); }, [step]);

      const goTo = useCallback((nextStep, newData = {}) => {
        setHistory(h => [...h, step]);
        setData(d => ({ ...d, ...newData }));
        setStep(nextStep);
        setCopiedText(null);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, [step]);

      const goBack = useCallback(() => {
        if (history.length > 0) {
          setStep(history[history.length - 1]);
          setHistory(h => h.slice(0, -1));
          setCopiedText(null);
        }
      }, [history]);

      const reset = useCallback(() => {
        setStep(STEPS.PATIENT_NAME);
        setData({ patientFirstName:"", period:"", insurance:"", insuranceAccepted:true, name:"", age:"", lenses:"", lensType:"" });
        setHistory([]);
        setCopiedText(null);
      }, []);

      const copyText = useCallback((text) => {
        navigator.clipboard.writeText(text).then(() => {
          setCopiedText(text);
          setTimeout(() => setCopiedText(null), 2000);
        }).catch(() => {
          const ta = document.createElement("textarea");
          ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
          setCopiedText(text);
          setTimeout(() => setCopiedText(null), 2000);
        });
      }, []);

      const isCopied = (fragment) => copiedText !== null && copiedText.includes(fragment);
      const pn = data.patientFirstName;
      const periodLabel = data.period === "manha" ? "Manhã" : data.period === "tarde" ? "Tarde" : "";
      const periodHour = data.period === "manha" ? "A clínica abre às 8h. Você pode chegar para ficha e exames até as 11h." : "A clínica abre às 14h. Você pode chegar para ficha e exames até as 17h.";

      const stepOrder = [STEPS.PATIENT_NAME, STEPS.GREETING, STEPS.PERIOD, STEPS.INSURANCE, STEPS.DATA, STEPS.LENSES, STEPS.CONFIRM, STEPS.CLOSING];
      const currentIdx = stepOrder.indexOf(step);

      const renderStep = () => {
        switch (step) {

          case STEPS.PATIENT_NAME:
            return (
              <div className="step-content">
                <div style={{ textAlign:"center", padding:"20px 0 10px" }}>
                  <div style={{ fontSize:"48px", marginBottom:"12px" }}>👋</div>
                  <h2 style={{ ...h2Style, fontSize:"22px", textAlign:"center" }}>Novo Atendimento</h2>
                  <p style={{ color:"#6b7280", fontSize:"14px", lineHeight:"1.5" }}>Digite o nome do paciente como aparece no WhatsApp para personalizar as mensagens.</p>
                </div>
                <div style={{ marginTop:"20px" }}>
                  <label style={labelStyle}>Nome do paciente (primeiro nome):</label>
                  <input ref={nameInputRef} type="text" placeholder="Ex: Maria, João, Ana..." value={data.patientFirstName}
                    onChange={e => setData(d => ({ ...d, patientFirstName: e.target.value }))}
                    onKeyDown={e => { if (e.key === "Enter" && data.patientFirstName.trim()) goTo(STEPS.GREETING); }}
                    style={{ ...inputStyle, fontSize:"18px", padding:"14px 16px", textAlign:"center" }} />
                </div>
                <button onClick={() => goTo(STEPS.GREETING)}
                  disabled={!data.patientFirstName.trim()}
                  style={{ ...resetBtnStyle, width:"100%", marginTop:"16px", justifyContent:"center", fontSize:"16px", padding:"14px", opacity: data.patientFirstName.trim() ? 1 : 0.4 }}>
                  Iniciar atendimento →
                </button>
                <button onClick={() => { setData(d => ({ ...d, patientFirstName: "" })); goTo(STEPS.GREETING); }}
                  style={{ width:"100%", marginTop:"8px", padding:"12px", background:"none", border:"1px solid #e5e7eb", borderRadius:"8px", color:"#9ca3af", fontSize:"13px", fontWeight:600 }}>
                  Pular (sem nome)
                </button>
              </div>
            );

          case STEPS.GREETING: {
            const greetingMsg = pn
              ? `Olá ${pn}! 😊 Seja bem-vindo(a) à Clínica de Olhos Rondônia! Você gostaria de agendar uma consulta ou precisa de ajuda com outro assunto?`
              : `Olá! 😊 Bem-vindo(a) à Clínica de Olhos Rondônia! Você gostaria de agendar uma consulta ou precisa de ajuda com outro assunto?`;
            return (
              <div className="step-content">
                <h2 style={h2Style}>👋 Saudação Inicial</h2>
                {pn && <div style={{ display:"inline-block", background:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:"20px", padding:"4px 14px", fontSize:"13px", color:"#166534", fontWeight:600, marginBottom:"12px" }}>Paciente: {pn}</div>}
                <Alert type="info">O paciente acabou de enviar mensagem. Responda em até 5 minutos!</Alert>
                <MessageBubble text={greetingMsg} onCopy={copyText} copied={isCopied("Clínica de Olhos")} />
                <div style={{ marginTop:"20px" }}>
                  <div style={questionStyle}>O que o paciente respondeu?</div>
                  <ChoiceButton label="Quer agendar consulta" emoji="📅" onClick={() => goTo(STEPS.PERIOD)} />
                  <ChoiceButton label="Outro assunto" emoji="💬" sublabel="Atestado, exame, dúvida, etc." onClick={() => goTo(STEPS.OTHER)} />
                  <ChoiceButton label="Não respondeu ainda" emoji="⏳" sublabel="Aguarde até 30 min" onClick={() => goTo(STEPS.NO_RESPONSE_1)} />
                </div>
              </div>
            );
          }

          case STEPS.PERIOD:
            return (
              <div className="step-content">
                <h2 style={h2Style}>📅 Etapa 1 — Período</h2>
                <MessageBubble text={pn ? `Ótimo, ${pn}! Para qual período você prefere: manhã ou tarde?` : "Ótimo! Para qual período você prefere: manhã ou tarde?"} onCopy={copyText} copied={isCopied("período")} />
                <div style={{ marginTop:"20px" }}>
                  <div style={questionStyle}>O paciente escolheu:</div>
                  <ChoiceButton label="Manhã" emoji="🌅" sublabel="8h às 11h" onClick={() => goTo(STEPS.INSURANCE, { period:"manha" })} />
                  <ChoiceButton label="Tarde" emoji="🌇" sublabel="14h às 17h" onClick={() => goTo(STEPS.INSURANCE, { period:"tarde" })} />
                </div>
              </div>
            );

          case STEPS.INSURANCE:
            return (
              <div className="step-content">
                <h2 style={h2Style}>🏥 Etapa 2 — Convênio</h2>
                <MessageBubble text="Perfeito! Você possui convênio ou será consulta particular?" onCopy={copyText} copied={isCopied("convênio")} />
                <div style={{ marginTop:"20px" }}>
                  <div style={questionStyle}>O paciente respondeu:</div>
                  <ChoiceButton label="Tem convênio" emoji="📋" sublabel="Unimed, Bradesco, etc." onClick={() => goTo(STEPS.INSURANCE_CHECK)} />
                  <ChoiceButton label="Particular" emoji="💳" onClick={() => goTo(STEPS.DATA, { insurance:"Particular" })} />
                </div>
              </div>
            );

          case STEPS.INSURANCE_CHECK:
            return (
              <div className="step-content">
                <h2 style={h2Style}>📋 Verificar Convênio</h2>
                <Alert type="warning">Verifique se o convênio informado é aceito pela clínica antes de prosseguir!</Alert>
                <div style={{ marginTop:"16px" }}>
                  <label style={labelStyle}>Qual convênio o paciente informou?</label>
                  <input type="text" placeholder="Ex: Unimed, Bradesco Saúde..." value={data.insurance}
                    onChange={e => setData(d => ({ ...d, insurance: e.target.value }))} style={inputStyle} />
                </div>
                <div style={{ marginTop:"20px" }}>
                  <div style={questionStyle}>O convênio é aceito?</div>
                  <ChoiceButton label="Sim, é aceito" emoji="✅" onClick={() => goTo(STEPS.DATA, { insuranceAccepted:true })} />
                  <ChoiceButton label="Não é aceito" emoji="❌" onClick={() => goTo(STEPS.DATA, { insuranceAccepted:false })} />
                </div>
                {!data.insuranceAccepted && (
                  <MessageBubble text={`Infelizmente ainda não trabalhamos com o convênio ${data.insurance || "[nome]"}. Mas temos consulta particular com valor acessível. Deseja agendar assim mesmo?`} onCopy={copyText} copied={isCopied("Infelizmente")} />
                )}
              </div>
            );

          case STEPS.DATA:
            return (
              <div className="step-content">
                <h2 style={h2Style}>📝 Etapa 3 — Dados do Paciente</h2>
                <MessageBubble text="Pode me informar seu nome completo e idade, por favor?" onCopy={copyText} copied={isCopied("nome completo")} />
                <div style={{ marginTop:"16px" }}>
                  <label style={labelStyle}>Nome completo que o paciente informou:</label>
                  <input type="text" placeholder="Ex: Maria da Silva" value={data.name}
                    onChange={e => setData(d => ({ ...d, name: e.target.value }))} style={inputStyle} />
                  <label style={{ ...labelStyle, marginTop:"12px" }}>Idade:</label>
                  <input type="text" placeholder="Ex: 45" value={data.age}
                    onChange={e => setData(d => ({ ...d, age: e.target.value }))} style={inputStyle} />
                </div>
                <div style={{ marginTop:"20px" }}>
                  <ChoiceButton label="Próximo passo →" emoji="✅" onClick={() => goTo(STEPS.LENSES)} />
                </div>
              </div>
            );

          case STEPS.LENSES:
            return (
              <div className="step-content">
                <h2 style={h2Style}>👁️ Etapa 4 — Lentes de Contato</h2>
                <MessageBubble text={pn ? `${pn}, você utiliza lentes de contato?` : "Você utiliza lentes de contato?"} onCopy={copyText} copied={isCopied("lentes de contato")} />
                <div style={{ marginTop:"20px" }}>
                  <div style={questionStyle}>O paciente respondeu:</div>
                  <ChoiceButton label="Sim, usa lentes" emoji="👁️" onClick={() => goTo(STEPS.LENSES_WARNING, { lenses:"sim" })} />
                  <ChoiceButton label="Não usa lentes" emoji="👍" onClick={() => goTo(STEPS.CONFIRM, { lenses:"nao" })} />
                </div>
              </div>
            );

          case STEPS.LENSES_WARNING:
            return (
              <div className="step-content">
                <h2 style={h2Style}>⚠️ Aviso sobre Lentes</h2>
                <Alert type="warning">É obrigatório informar sobre a retirada das lentes!</Alert>
                <div style={{ marginTop:"12px" }}>
                  <div style={questionStyle}>Qual tipo de lente?</div>
                  <ChoiceButton label="Gelatinosa (mole)" emoji="💧" sublabel="Retirar 3 dias antes" onClick={() => setData(d => ({ ...d, lensType:"gelatinosa" }))} />
                  <ChoiceButton label="Rígida (dura)" emoji="🔵" sublabel="Retirar 7 dias antes" onClick={() => setData(d => ({ ...d, lensType:"rigida" }))} />
                  <ChoiceButton label="Não sabe o tipo" emoji="❓" onClick={() => setData(d => ({ ...d, lensType:"nao_sabe" }))} />
                </div>
                {data.lensType === "gelatinosa" && (<>
                  <MessageBubble text="Para que o exame seja preciso, será necessário retirar suas lentes de contato gelatinosas pelo menos 3 dias antes da consulta, ok? 😊" onCopy={copyText} copied={isCopied("gelatinosas")} />
                  <ChoiceButton label="Paciente entendeu → Confirmar" emoji="✅" onClick={() => goTo(STEPS.CONFIRM)} />
                </>)}
                {data.lensType === "rigida" && (<>
                  <MessageBubble text="Para que o exame seja preciso, será necessário retirar suas lentes de contato rígidas pelo menos 7 dias antes da consulta, ok? 😊" onCopy={copyText} copied={isCopied("rígidas")} />
                  <ChoiceButton label="Paciente entendeu → Confirmar" emoji="✅" onClick={() => goTo(STEPS.CONFIRM)} />
                </>)}
                {data.lensType === "nao_sabe" && (<>
                  <MessageBubble text="Para que o exame seja preciso, será necessário retirar suas lentes de contato com antecedência. Lentes gelatinosas (moles): 3 dias antes. Lentes rígidas (duras): 7 dias antes. Se não souber o tipo, retire pelo menos 7 dias antes para garantir, tudo bem? 😊" onCopy={copyText} copied={isCopied("antecedência")} />
                  <ChoiceButton label="Paciente entendeu → Confirmar" emoji="✅" onClick={() => goTo(STEPS.CONFIRM)} />
                </>)}
              </div>
            );

          case STEPS.CONFIRM: {
            const displayName = data.name || pn || "";
            const confirmMsg = `${displayName ? displayName + ", v" : "V"}ou confirmar seus dados:\n\n📋 Nome: ${data.name || pn || "[aguardando]"}\n📋 Idade: ${data.age || "[aguardando]"}\n📋 Convênio: ${data.insurance || "Particular"}\n📋 Período: ${periodLabel}\n👨‍⚕️ Médico: Dr. Ítalo Cavalcante\n\n${periodHour} O atendimento é por ordem de chegada.\n\nPosso confirmar seu agendamento?`;
            return (
              <div className="step-content">
                <h2 style={h2Style}>✅ Etapa 5 — Confirmação</h2>
                <Alert type="success">Esta é a etapa mais importante! Confira os dados e peça o SIM.</Alert>
                <MessageBubble text={confirmMsg} onCopy={copyText} copied={isCopied("confirmar seus dados")} />
                <div style={{ marginTop:"20px" }}>
                  <div style={questionStyle}>O paciente confirmou?</div>
                  <ChoiceButton label="Sim, confirmou!" emoji="🎉" onClick={() => goTo(STEPS.CLOSING)} />
                  <ChoiceButton label="Quer mudar algo" emoji="🔄" sublabel="Volte à etapa necessária" onClick={goBack} />
                  <ChoiceButton label="Não respondeu" emoji="⏳" onClick={() => goTo(STEPS.NO_RESPONSE_1)} />
                </div>
              </div>
            );
          }

          case STEPS.CLOSING: {
            const firstName = data.name ? data.name.split(" ")[0] : pn || "";
            return (
              <div className="step-content">
                <h2 style={h2Style}>🎉 Etapa 6 — Encerramento</h2>
                <MessageBubble text={`Agendamento confirmado${firstName ? `, ${firstName}` : ""}! ✅ Estamos te esperando.\n\n📍 Segue nossa localização para facilitar. Qualquer dúvida, estamos à disposição. Até lá!`} onCopy={copyText} copied={isCopied("Agendamento confirmado")} />
                <Alert type="warning">Agora envie a localização da clínica no Google Maps!</Alert>
                <div style={{ marginTop:"24px", padding:"24px", background:"#f0fdf4", borderRadius:"12px", textAlign:"center" }}>
                  <div style={{ fontSize:"32px", marginBottom:"8px" }}>🎉</div>
                  <div style={{ fontSize:"16px", fontWeight:700, color:"#166534" }}>Atendimento concluído!</div>
                  <div style={{ fontSize:"13px", color:"#4ade80", marginTop:"4px" }}>Não esqueça de registrar o agendamento no sistema.</div>
                  <button onClick={reset} style={resetBtnStyle}><ResetIcon /> Novo atendimento</button>
                </div>
              </div>
            );
          }

          case STEPS.OTHER:
            return (
              <div className="step-content">
                <h2 style={h2Style}>💬 Outro Assunto</h2>
                <MessageBubble text={pn ? `Claro, ${pn}! Me conta o que você precisa que vou direcionar para a pessoa certa te ajudar 😊` : "Claro! Me conta o que você precisa que vou direcionar para a pessoa certa te ajudar 😊"} onCopy={copyText} copied={isCopied("pessoa certa")} />
                <Alert type="info">Ouça o que o paciente precisa e encaminhe para o setor responsável.</Alert>
                <Alert type="warning">Se não souber resolver, NUNCA diga "não sei". Diga que vai verificar:</Alert>
                <MessageBubble text="Entendi! Vou verificar isso com a equipe e te retorno em seguida. Pode aguardar um momento?" onCopy={copyText} copied={isCopied("verificar isso")} />
                <div style={{ marginTop:"20px" }}>
                  <ChoiceButton label="Resolvido → Novo atendimento" emoji="✅" onClick={reset} />
                  <ChoiceButton label="Paciente quer agendar também" emoji="📅" onClick={() => goTo(STEPS.PERIOD)} />
                </div>
              </div>
            );

          case STEPS.NO_RESPONSE_1:
            return (
              <div className="step-content">
                <h2 style={h2Style}>⏳ Paciente Não Respondeu</h2>
                <Alert type="info">Aguarde 30 minutos. Depois envie:</Alert>
                <MessageBubble text={pn ? `Oi ${pn}! 😊 Vi que ficou alguma dúvida. Posso te ajudar com algo mais?` : "Oi! 😊 Vi que ficou alguma dúvida. Posso te ajudar com algo mais?"} onCopy={copyText} copied={isCopied("ficou alguma dúvida")} />
                <div style={{ marginTop:"20px" }}>
                  <div style={questionStyle}>E depois?</div>
                  <ChoiceButton label="Respondeu!" emoji="🎉" sublabel="Volte ao fluxo" onClick={goBack} />
                  <ChoiceButton label="Ainda não respondeu (2h+)" emoji="⏳" onClick={() => goTo(STEPS.NO_RESPONSE_2)} />
                </div>
              </div>
            );

          case STEPS.NO_RESPONSE_2:
            return (
              <div className="step-content">
                <h2 style={h2Style}>⏳ Última Tentativa</h2>
                <Alert type="warning">Envie apenas mais UMA mensagem. Máximo de 2 follow-ups.</Alert>
                <MessageBubble text={pn ? `Oi ${pn}! Caso ainda tenha interesse em agendar sua consulta, estou por aqui. É só me chamar! 😊` : "Oi! Caso ainda tenha interesse em agendar sua consulta, estou por aqui. É só me chamar! 😊"} onCopy={copyText} copied={isCopied("interesse em agendar")} />
                <div style={{ marginTop:"24px", padding:"20px", background:"#fef3c7", borderRadius:"12px", textAlign:"center" }}>
                  <div style={{ fontSize:"13px", color:"#92400e", fontWeight:600 }}>Não insista mais. Se o paciente responder depois, retome normalmente.</div>
                </div>
                <div style={{ marginTop:"16px" }}>
                  <ChoiceButton label="Novo atendimento" emoji="🔄" onClick={reset} />
                </div>
              </div>
            );

          default: return null;
        }
      };

      return (
        <div style={{ minHeight:"100vh", background:"#f8faf8" }}>
          <div style={{ background:"linear-gradient(135deg, #166534, #16a34a)", padding:"16px 20px", color:"#fff", position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 8px rgba(0,0,0,0.15)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", maxWidth:"480px", margin:"0 auto" }}>
              <div>
                <div style={{ fontSize:"15px", fontWeight:800, letterSpacing:"-0.3px" }}>Clínica de Olhos Rondônia</div>
                <div style={{ fontSize:"11px", opacity:0.85, marginTop:"2px" }}>
                  {pn ? `Atendendo: ${pn}` : "Roteiro de Atendimento WhatsApp"}
                </div>
              </div>
              <button onClick={reset} style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"#fff", borderRadius:"8px", padding:"8px 14px", fontSize:"12px", fontWeight:700, display:"flex", alignItems:"center", gap:"5px" }}>
                <ResetIcon /> Reiniciar
              </button>
            </div>
          </div>
          <div style={{ maxWidth:"480px", margin:"0 auto", padding:"20px 16px 80px" }}>
            {currentIdx > 0 && <StepIndicator current={currentIdx} total={stepOrder.length} />}
            {history.length > 0 && (
              <button onClick={goBack} style={{ background:"none", border:"none", color:"#6b7280", fontSize:"13px", padding:"4px 0", marginBottom:"12px", fontWeight:600, display:"flex", alignItems:"center", gap:"4px" }}>← Voltar</button>
            )}
            {renderStep()}
          </div>
        </div>
      );
    }

    const h2Style = { fontSize:"20px", fontWeight:800, color:"#166534", margin:"0 0 16px 0", letterSpacing:"-0.3px" };
    const questionStyle = { fontSize:"13px", fontWeight:700, color:"#6b7280", textTransform:"uppercase", letterSpacing:"0.8px", marginBottom:"10px" };
    const labelStyle = { display:"block", fontSize:"13px", fontWeight:600, color:"#374151", marginBottom:"6px" };
    const inputStyle = { width:"100%", padding:"12px 14px", border:"2px solid #e5e7eb", borderRadius:"8px", fontSize:"15px", fontFamily:"inherit", boxSizing:"border-box", outline:"none" };
    const resetBtnStyle = { marginTop:"16px", padding:"12px 24px", background:"#166534", color:"#fff", border:"none", borderRadius:"8px", fontSize:"14px", fontWeight:700, display:"inline-flex", alignItems:"center", gap:"6px" };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
